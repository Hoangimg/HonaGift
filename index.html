<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<style>
*{
    -webkit-touch-callout: none;   /* Tắt menu "Copy/Save" khi long-press trên iOS */
    -webkit-user-select: none;     /* Tắt bôi đen/chọn text */
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent; /* Tắt highlight xám khi chạm */
}
html, body{
    margin:0;
    background:#1e1e1e;
    color:white;
    font-family:Arial;
    text-align:center;
    overflow:hidden;       /* Tắt scroll/bounce gây mất sự kiện touchend */
    overscroll-behavior:none;
    touch-action:none;     /* Tắt pan/zoom/scroll mặc định của trình duyệt trên toàn trang */
    height:100%;
}
h2{
    margin-top:20px;
}
.row{
    display:flex;
    justify-content:center;
}
.btn{
    width:110px;
    height:110px;
    margin:10px;
    border:none;
    border-radius:20px;
    font-size:45px;
    background:#333;
    color:white;
    touch-action:none;     /* Quan trọng: chặn long-press / context menu của trình duyệt trên nút */
}
.btn:active{
    background:#555;       /* Phản hồi thị giác khi nhấn, thay cho hành vi mặc định */
}
.stop{
    background:#d32f2f;
}
.status{
    margin:20px;
    font-size:20px;
}
.speed-box{
    margin:25px auto;
    width:80%;
    max-width:320px;
}
.speed-box label{
    display:block;
    margin-bottom:8px;
    font-size:18px;
}
.speed-box input[type=range]{
    width:100%;
    height:30px;
    touch-action:pan-x;   /* Cho phép kéo ngang trên thanh trượt, dù toàn trang đã touch-action:none */
}
</style>
</head>
<body oncontextmenu="return false">
<h2>KAYRA ROBOT</h2>
<div class="status" id="status">
Disconnected
</div>

<div class="speed-box">
  <label for="speedSlider">Tốc độ: <span id="speedValue">200</span> / 255</label>
  <input type="range" id="speedSlider" min="60" max="255" value="200">
</div>

<div class="row">
  <button class="btn" data-cmd="F">↑</button>
</div>
<div class="row">
  <button class="btn" data-cmd="L">←</button>
  <button class="btn stop" data-cmd="STOP">■</button>
  <button class="btn" data-cmd="R">→</button>
</div>
<div class="row">
  <button class="btn" data-cmd="B">↓</button>
</div>
<script>
const client = mqtt.connect(
'wss://457653a60da34a48ba1f37c9d63209b1.s1.eu.hivemq.cloud:8884/mqtt',
{
    username:'Kayra',
    password:'KayraandHona24/6/2025'
});
client.on('connect',()=>{
    document.getElementById('status').innerHTML = 'Connected';
});
client.on('error',()=>{
    document.getElementById('status').innerHTML = 'Error';
});

// ---- Tốc độ ----
let speed = 200;
const speedSlider = document.getElementById('speedSlider');
const speedValue = document.getElementById('speedValue');

speedSlider.addEventListener('input', ()=>{
    speed = parseInt(speedSlider.value, 10);
    speedValue.textContent = speed;
    // Nếu đang giữ nút di chuyển, gửi ngay tốc độ mới thay vì chờ heartbeat
    if(currentDir) send(currentDir);
});

function send(cmd){
    client.publish('robot/cmd', JSON.stringify({cmd:cmd, speed:speed}));
    console.log(cmd, speed);
}

// ---- Giữ nút = gửi lệnh lặp lại (heartbeat) ----
// ESP32 có watchdog: nếu quá ~600ms không nhận lệnh mới sẽ tự dừng động cơ.
// Vì vậy khi giữ nút phải gửi lại lệnh đều đặn, không chỉ gửi 1 lần lúc chạm.
let currentDir = null;
let holdTimer = null;
const HEARTBEAT_MS = 200; // phải nhỏ hơn nhiều so với watchdog timeout bên ESP32

function startHold(cmd){
    currentDir = cmd;
    send(cmd);                 // gửi ngay lập tức, không chờ tick đầu tiên
    clearInterval(holdTimer);
    holdTimer = setInterval(()=> send(cmd), HEARTBEAT_MS);
}

function stopHold(){
    clearInterval(holdTimer);
    holdTimer = null;
    currentDir = null;
    send('S');
}

// Gắn sự kiện bằng JS thay vì onmousedown/ontouchstart trong HTML,
// dùng { passive:false } để có thể preventDefault() -> chặn long-press menu, chọn text, kéo trang.
document.querySelectorAll('.btn').forEach(btn=>{
    const cmd = btn.dataset.cmd;

    if(cmd === 'STOP'){
        btn.addEventListener('click', e=>{
            e.preventDefault();
            stopHold();
        });
        return;
    }

    const start = e=>{
        e.preventDefault();
        startHold(cmd);
    };
    const end = e=>{
        e.preventDefault();
        stopHold();
    };

    btn.addEventListener('touchstart', start, {passive:false});
    btn.addEventListener('touchend', end, {passive:false});
    btn.addEventListener('touchcancel', end, {passive:false}); // quan trọng: khi hệ thống "nuốt" touch (ví dụ hộp thoại bật lên), vẫn nhận lệnh dừng

    btn.addEventListener('mousedown', start);
    btn.addEventListener('mouseup', end);
    btn.addEventListener('mouseleave', end); // nếu rê chuột ra ngoài nút mà vẫn giữ, robot không bị kẹt
});

// Lưới an toàn cuối cùng: nếu vì lý do gì đó tay rời khỏi màn hình mà
// không bắn đúng sự kiện touchend trên nút, vẫn dừng heartbeat + gửi STOP.
document.addEventListener('touchend', stopHold, {passive:true});
window.addEventListener('blur', stopHold);
</script>
</body>
</html>
