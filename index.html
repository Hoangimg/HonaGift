<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>

body{
    margin:0;
    background:#1e1e1e;
    color:white;
    font-family:Arial;
    text-align:center;
}

h2{
    margin-top:20px;
}

.row{
    display:flex;
    justify-content:center;
}

.btn{
    width:110px;
    height:110px;
    margin:10px;
    border:none;
    border-radius:20px;
    font-size:45px;
    background:#333;
    color:white;
}

.stop{
    background:#d32f2f;
}

.status{
    margin:20px;
    font-size:20px;
}

</style>
</head>

<body>

<h2>KAYRA ROBOT</h2>

<div class="status" id="status">
Disconnected
</div>

<div class="row">
  <button class="btn"
    ontouchstart="send('F')"
    ontouchend="send('S')"
    onmousedown="send('F')"
    onmouseup="send('S')">↑</button>
</div>

<div class="row">
  <button class="btn"
    ontouchstart="send('L')"
    ontouchend="send('S')"
    onmousedown="send('L')"
    onmouseup="send('S')">←</button>

  <button class="btn stop"
    onclick="send('S')">■</button>

  <button class="btn"
    ontouchstart="send('R')"
    ontouchend="send('S')"
    onmousedown="send('R')"
    onmouseup="send('S')">→</button>
</div>

<div class="row">
  <button class="btn"
    ontouchstart="send('B')"
    ontouchend="send('S')"
    onmousedown="send('B')"
    onmouseup="send('S')">↓</button>
</div>

<script>

const client = mqtt.connect(
'wss://457653a60da34a48ba1f37c9d63209b1.s1.eu.hivemq.cloud:8884/mqtt',
{
    username:'Kayra',
    password:'KayraandHona24/6/2025'
});

client.on('connect',()=>{
    document.getElementById('status').innerHTML =
    'Connected';
});

client.on('error',()=>{
    document.getElementById('status').innerHTML =
    'Error';
});

function send(cmd){

    client.publish(
        'robot/cmd',
        JSON.stringify({cmd:cmd})
    );

    console.log(cmd);
}

</script>

</body>
</html>
